<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="小说初稿与技术随笔。">
  <title>加乐 罗 · 作品集</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html"><span class="brand-mark">文</span><span data-profile="name">你的笔名</span></a>
      <nav class="nav-links" aria-label="主导航">
        <a class="active" href="index.html">首页</a>
        <a href="#essays">短文</a>
        <a href="novel.html">小说</a>
        <a href="about.html">关于</a>
      </nav>
      <button class="icon-button" type="button" data-theme-toggle aria-label="切换主题">☾</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-grid">
        <div>
          <div class="eyebrow">Writer · Storyteller</div>
          <h1>写下故事，<br>也记录技术如何<em>改变语言</em>。</h1>
          <p class="hero-copy" data-profile="bio"></p>
        </div>
        <aside class="hero-aside">
          <strong data-essay-count>4 篇短文</strong>
          以及一部正在连载的小说。<br>
          欢迎慢慢阅读。
        </aside>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="section-head">
          <div>
            <div class="eyebrow">Featured Novel</div>
            <h2 class="section-title">长篇小说</h2>
          </div>
          <p class="section-note">从第一章开始，阅读正在创作中的小说初稿。</p>
        </div>

        <article class="novel-card" data-novel-card>
          <div class="novel-content">
            <div class="novel-meta">
              <span class="pill" data-novel-status></span>
              <span class="pill" data-novel-words></span>
              <span class="pill" data-novel-updated></span>
            </div>
            <h3 data-novel-title></h3>
            <p data-novel-desc></p>
            <a class="button button-light" href="novel.html">开始阅读 <span aria-hidden="true">→</span></a>
          </div>
        </article>
      </div>
    </section>

    <section class="section" id="essays">
      <div class="container">
        <div class="section-head">
          <div>
            <div class="eyebrow">Essays & Stories</div>
            <h2 class="section-title">短文与随笔</h2>
          </div>
          <p class="section-note">关于编程、人工智能，以及人类如何逐步改变与机器交流的方式。</p>
        </div>
        <div class="toolbar">
          <input class="search" data-search type="search" placeholder="搜索文章标题或标签…" aria-label="搜索文章">
        </div>
        <div class="essay-grid" data-essay-grid></div>
      </div>
    </section>

    <section class="quote-section">
      <div class="container quote-card">
        <blockquote>“把自己的想法准确地告诉计算机。”</blockquote>
        <cite>— <span data-profile="name"></span></cite>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>© <span data-year></span> <span data-profile="name"></span>. All rights reserved.</span>
      <div class="footer-links"><a data-profile="github" href="#">GitHub</a><a href="about.html">关于作者</a></div>
    </div>
  </footer>

  <script src="assets/content.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
