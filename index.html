<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="小说初稿与技术随笔。">
  <title>阅读</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <nav class="nav-links" aria-label="主导航">
        <a href="novel.html">小说</a>
        <a href="#essays">短文与随笔</a>
      </nav>
      <button class="icon-button" type="button" data-theme-toggle aria-label="切换主题">☾</button>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <div class="section-head">
          <div>
            <h2 class="section-title">长篇小说</h2>
          </div>
        </div>

        <article class="novel-card" data-novel-card>
          <div class="novel-content">
            <div class="novel-meta">
              <span class="pill" data-novel-status></span>
              <span class="pill" data-novel-words></span>
              <span class="pill" data-novel-updated></span>
            </div>
            <h3 data-novel-title></h3>
            <p data-novel-desc></p>
            <a class="button button-light" href="novel.html">开始阅读 <span aria-hidden="true">→</span></a>
          </div>
        </article>
      </div>
    </section>

    <section class="section" id="essays">
      <div class="container">
        <div class="section-head">
          <div>
            <h2 class="section-title">短文与随笔</h2>
          </div>
        </div>
        <div class="toolbar">
          <input class="search" data-search type="search" placeholder="搜索文章标题或标签…" aria-label="搜索文章">
        </div>
        <div class="essay-grid" data-essay-grid></div>
      </div>
    </section>

  </main>

  <script src="assets/content.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
